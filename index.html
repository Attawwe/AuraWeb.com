    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Aura",
      "description": "Agence web dans l'Yonne spécialisée dans la création de sites internet sur-mesure, le référencement local et l'automatisation IA.",
      "url": "https://www.auraweb.fr",
      "email": "contact@auraweb.fr",
      "areaServed": [
        {
          "@type": "AdministrativeArea",
          "name": "Yonne"
        },
        {
          "@type": "Country",
          "name": "France"
        }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Bourgogne-Franche-Comté",
        "addressLocality": "Yonne",
        "addressCountry": "FR"
      },
      "serviceType": ["Création de site web", "Refonte de site web", "SEO", "Automatisation IA", "Maintenance web", "Identité visuelle"],
      "priceRange": "€€"
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Combien coûte un site web ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le prix dépend de la complexité du projet. Un site vitrine démarre à partir de quelques centaines d'euros. On établit toujours un devis clair et détaillé avant de commencer — pas de mauvaise surprise, pas de frais cachés."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps faut-il pour créer un site ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un site vitrine est livré en 1 à 2 semaines. Pour des projets plus complexes avec des fonctionnalités spécifiques, comptez 3 à 4 semaines. Vous êtes informé de l'avancement à chaque étape."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que je pourrai modifier mon site moi-même ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolument. On vous livre un site sur WordPress avec une interface intuitive, et on vous forme à l'utiliser. Textes, images, articles — vous gérez en toute autonomie."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qui est inclus dans la maintenance ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hébergement, nom de domaine, mises à jour de sécurité, sauvegardes régulières et petites modifications. Votre site reste en ligne, rapide et sécurisé — sans que vous ayez à vous en soucier."
          }
        },
        {
          "@type": "Question",
          "name": "Je n'ai pas de contenu (textes, photos), c'est un problème ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pas du tout. On vous accompagne dans la rédaction de vos textes et on utilise des banques d'images professionnelles. L'important c'est votre message — on s'occupe du reste."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi choisir Aura plutôt qu'une autre agence ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On ne travaille pas avec des modèles préconçus. Chaque site est construit sur-mesure avec des technologies modernes qui offrent des performances supérieures aux sites WordPress classiques. Et surtout, on est dans l'Yonne — disponibles, réactifs et à votre écoute."
          }
        }
      ]
    }
    </script>
